name: Custom Build Wrapper
on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

jobs:
  check:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Should build?
        id: should_build
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git checkout origin/update build.md; then
            echo "first time building!"
            echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
          else
            UPDATE_CFG=$(./build.sh custom_config.toml --config-update)
            if [ "$UPDATE_CFG" ]; then
              echo "'$UPDATE_CFG'"
              echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
            else
              echo "SHOULD_BUILD=0" >> $GITHUB_OUTPUT
            fi
          fi

    outputs:
      SHOULD_BUILD: ${{ steps.should_build.outputs.SHOULD_BUILD }}

  run:
    needs: check
    if: ${{ needs.check.outputs.SHOULD_BUILD == 1 || github.event_name == 'workflow_dispatch' }}
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Get next version code
        id: next_ver_code
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list -L 1 | awk -F '\t' '{print $3}')
          if [ -z "$TAG" ]; then TAG=0; fi
          echo "NEXT_VER_CODE=$((TAG + 1))" >> $GITHUB_OUTPUT

      - name: Build modules/APKs
        run: ./build.sh custom_config.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEXT_VER_CODE: ${{ steps.next_ver_code.outputs.NEXT_VER_CODE }}

      - name: Re-sign APKs
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          if [ -z "$KEYSTORE" ]; then
            echo "No KEYSTORE secret found. Skipping signing."
            exit 0
          fi
          
          # Decode keystore
          echo "$KEYSTORE" | base64 -d > custom.keystore
          
          cd build || { echo "build folder not found"; exit 1; }
          
          # Find Android build tools for zipalign and apksigner
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          ZIPALIGN="$BUILD_TOOLS_PATH/zipalign"
          APKSIGNER="$BUILD_TOOLS_PATH/apksigner"

          for apk in *.apk; do
            [ -f "$apk" ] || continue
            echo "Processing $apk"
            
            # Strip generic test keys
            zip -d "$apk" "META-INF/*" || true
            
            # Zipalign into a new file
            "$ZIPALIGN" -p -f 4 "$apk" "aligned_$apk"
            
            # Sign with our custom keystore
            "$APKSIGNER" sign --ks ../custom.keystore \
              --ks-pass "pass:$KEYSTORE_PASS" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass "pass:$KEY_PASS" \
              "aligned_$apk"
              
            # Replace original with signed version
            mv "aligned_$apk" "$apk"
          done
          cd ..

      - name: Get output
        id: get_output
        run: |
          DELIM="$(openssl rand -hex 8)"
          echo "BUILD_LOG<<${DELIM}" >> "$GITHUB_OUTPUT"
          cat build.md >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: Upload modules to release
        uses: svenstaro/upload-release-action@v2
        with:
          body: ${{ steps.get_output.outputs.BUILD_LOG }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./build/*
          release_name: ReVanced Custom
          tag: ${{ steps.next_ver_code.outputs.NEXT_VER_CODE }}
          file_glob: true
          overwrite: true

      - name: Report to Telegram
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        if: env.TG_TOKEN != null && env.TG_CHAT != null
        run: |
          cd build || { echo "build folder not found"; exit 1; }
          
          NL=$'\n'
          APKS=""
          APK_COUNT=0
          
          for OUTPUT in *.apk; do
            [ -f "$OUTPUT" ] || continue
            DL_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/${{ steps.next_ver_code.outputs.NEXT_VER_CODE }}/${OUTPUT}"
            APKS+="${NL}📦 [${OUTPUT}](${DL_URL})"
            APK_COUNT=$((APK_COUNT + 1))
          done
          
          APKS=${APKS#"$NL"}
          
          BODY="$(sed 's/^\* \*\*/↪ \*\*/g; s/^\* `/↪ \*\*/g; s/`/\*/g; s/^\* /\↪/g; s/\*\*/\*/g; s/###//g; s/^- /↪ /g; /^==/d;' ../build.md)"
          
          DOWNLOAD_SECTION=""
          if [ $APK_COUNT -gt 0 ]; then
            DOWNLOAD_SECTION="*🔗 Download Links:*${NL}${NL}APKs:${NL}${APKS}${NL}"
          fi
          
          MSG="*New Custom Build completed! 🎉*
          
          ${BODY}
          
          ${DOWNLOAD_SECTION}
          *📊 Build Info:*
          ↪ Version: ${{ steps.next_ver_code.outputs.NEXT_VER_CODE }}
          ↪ Commit: [\`${GITHUB_SHA:0:7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})
          ↪ Repository: [${GITHUB_REPOSITORY}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY})
          "
          MSG=${MSG:0:4000}
          
          echo "--- Sending Summary Message ---"
          curl -X POST --data-urlencode "parse_mode=Markdown" --data-urlencode "disable_web_page_preview=true" --data-urlencode "text=${MSG}" --data-urlencode "chat_id=${TG_CHAT}" "https://api.telegram.org/bot${TG_TOKEN}/sendMessage"

